# Smoke test config for YOLOFT: 5 epochs, val every epoch, COCO output
task: detect
mode: train

train_method: all
train_slit: 20
datasampler: streamSampler

model:
data:
epochs: 5
patience: 50
batch: 4
imgsz: 640
save: True
save_period: 1
cache: ram
device:
workers: 4
project:
name:
exist_ok: False
pretrained: True
optimizer: auto
verbose: True
seed: 0
deterministic: True
single_cls: False
rect: False
cos_lr: False
close_mosaic: 10

resume: False
amp: true
fraction: 1.0
profile: False
overlap_mask: False
mask_ratio: 4
dropout: 0.0

