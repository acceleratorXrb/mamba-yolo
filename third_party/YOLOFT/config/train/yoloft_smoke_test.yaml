dfl: 1.5
pose: 12.0
kobj: 1.0

label_smoothing: 0.0
nbs: 64
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 2.0
translate: 0.02
scale: 0.2
shear: 0.0
perspective: 0.0001
flipud: 0.0
fliplr: 0.5
