val_interval: 1
split: test
save_json: True
save_hybrid: False
conf:
iou: 0.7
move: 0.2
max_det: 300
half: False
dnn: False
plots: True

source:
show: False
save_txt: False
save_conf: False
save_crop: False
show_labels: True
show_conf: True
vid_stride: 1
line_width:
