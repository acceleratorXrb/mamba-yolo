# Full UAVDT benchmark preset for Mamba-YOLO-T.
# Conservative optimization to test whether late-epoch mAP decay is caused by
# overly aggressive AdamW updates and strong mosaic augmentation.

epochs: 8
batch: 24
imgsz: 640
workers: 8
optimizer: AdamW
amp: false

lr0: 0.0005
lrf: 0.2
cos_lr: true
weight_decay: 0.0005
warmup_epochs: 8.0
warmup_momentum: 0.85
warmup_bias_lr: 0.02

close_mosaic: 3
mosaic: 0.3
translate: 0.02
scale: 0.15
hsv_h: 0.015
hsv_s: 0.3
hsv_v: 0.2
fliplr: 0.5
flipud: 0.0
mixup: 0.0
copy_paste: 0.0
