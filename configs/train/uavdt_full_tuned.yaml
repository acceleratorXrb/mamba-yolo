# Full UAVDT development preset for Mamba-YOLO-T.
# Goal: reduce early overfitting seen on the official benchmark split while
# giving small objects more pixels than the 640 baseline.

epochs: 30
batch: 16
imgsz: 800
workers: 8
optimizer: AdamW
amp: true

# Make the optimization smoother than the 640/SGD baseline.
lr0: 0.001
lrf: 0.1
cos_lr: true
weight_decay: 0.001
warmup_epochs: 5.0
warmup_momentum: 0.8
warmup_bias_lr: 0.05

# Keep augmentation, but reduce geometry distortion for aerial small targets.
close_mosaic: 5
mosaic: 0.7
translate: 0.05
scale: 0.3
hsv_h: 0.015
hsv_s: 0.5
hsv_v: 0.3
fliplr: 0.5
flipud: 0.0
mixup: 0.0
copy_paste: 0.0

# Leave task/data/model/project/name to the CLI caller.
