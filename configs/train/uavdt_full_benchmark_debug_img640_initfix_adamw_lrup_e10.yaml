# Full UAVDT benchmark reproduction config after the validator precision fix.
# Purpose:
# 1. Verify whether validation still becomes non-finite around epoch 6.
# 2. Keep the current AdamW + init-fix setup unchanged except shorter runtime.
# 3. Preserve in-training validation and diagnostics for root-cause analysis.

epochs: 10
batch: 24
imgsz: 640
workers: 8
optimizer: AdamW
amp: false
val: true

lr0: 0.001
lrf: 0.1
cos_lr: true
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.85
warmup_bias_lr: 0.05

close_mosaic: 5
mosaic: 0.5
translate: 0.05
scale: 0.2
hsv_h: 0.015
hsv_s: 0.4
hsv_v: 0.25
fliplr: 0.5
flipud: 0.0
mixup: 0.0
copy_paste: 0.0
