# Development full-UAVDT temporal benchmark preset.
# Same training data scope as full benchmark, but runs validation every 2 epochs
# so mAP can be observed during development.

epochs: 50
batch: 4
imgsz: 640
workers: 8
optimizer: AdamW
amp: false
val: true
val_interval: 2

temporal: true
temporal_stride: 1
temporal_clip_length: 3

lr0: 0.001
lrf: 0.1
cos_lr: true
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.85
warmup_bias_lr: 0.05

close_mosaic: 0
mosaic: 0.0
translate: 0.05
scale: 0.2
hsv_h: 0.015
hsv_s: 0.4
hsv_v: 0.25
fliplr: 0.5
flipud: 0.0
mixup: 0.0
copy_paste: 0.0
